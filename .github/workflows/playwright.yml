name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    name: Discover spec files
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      specs: ${{ steps.discover.outputs.specs }}
    steps:
      - uses: actions/checkout@v4
      - id: discover
        run: |
          SPECS=$(ls tests/*.spec.ts | sed 's|tests/||' | jq -R . | jq -s . | tr -d '\n')
          echo "specs=$SPECS" >> "$GITHUB_OUTPUT"
          echo "Discovered specs: $SPECS"

  test:
    name: E2E — ${{ matrix.spec }}
    needs: discover
    timeout-minutes: 30
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spec: ${{ fromJson(needs.discover.outputs.specs) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright test — ${{ matrix.spec }}
        run: npx playwright test tests/${{ matrix.spec }}
        env:
          TEST_ADMIN_NAME: ${{ secrets.TEST_ADMIN_NAME || 'admin' }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || 'stub' }}
          TEST_BASE_URL: http://localhost:3000
          SECRET_COOKIE_PASSWORD: ${{ secrets.SECRET_COOKIE_PASSWORD || 'ci-stub-password-32-chars-minimum!!' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'stub' }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL || 'ci@example.com' }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY || '{}' }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID || 'stub' }}
          NEXT_PUBLIC_WEBPUSH_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_WEBPUSH_PUBLIC_KEY || 'stub' }}
          WEBPUSH_PRIVATE_KEY: ${{ secrets.WEBPUSH_PRIVATE_KEY || 'stub' }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.spec }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  summary:
    name: Playwright Summary
    needs: [discover, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summarize
        run: |
          echo "### Playwright E2E Results ${{ needs.test.result == 'success' && '✅' || '❌' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total spec files: ${{ needs.discover.outputs.specs }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Result: ${{ needs.test.result }}" >> "$GITHUB_STEP_SUMMARY"
