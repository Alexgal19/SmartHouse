name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      run: npx playwright test tests/control-cards-comments.spec.ts
      env:
        # Pamiętaj, aby dodać te zmienne jako sekrety w GitHub Settings
        TEST_ADMIN_NAME: ${{ secrets.TEST_ADMIN_NAME || 'admin' }}
        TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD || 'stub' }}
        TEST_BASE_URL: http://localhost:3000
        # Wymagane do poprawnego działania aplikacji Next.js w tle
        SECRET_COOKIE_PASSWORD: ${{ secrets.SECRET_COOKIE_PASSWORD || 'ci-stub-password-32-chars-minimum!!' }}
        ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'stub' }}
        GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL || 'ci@example.com' }}
        GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY || '{}' }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID || 'stub' }}
        NEXT_PUBLIC_WEBPUSH_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_WEBPUSH_PUBLIC_KEY || 'stub' }}
        WEBPUSH_PRIVATE_KEY: ${{ secrets.WEBPUSH_PRIVATE_KEY || 'stub' }}

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
