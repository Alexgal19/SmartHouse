name: Coverage Enforcer — mandatory tests for new code

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: coverage-enforcer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enforce:
    name: Generate & validate tests for untested changes
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Coverage Enforcer — check mode
        id: check
        run: |
          node scripts/coverage-enforcer.mjs --check > coverage-report.json
          # JSON jest wieloliniowy — kompaktuj do jednej linii dla GITHUB_OUTPUT
          echo "report=$(jq -c . coverage-report.json)" >> "$GITHUB_OUTPUT"

      - name: Coverage Enforcer — generate & run
        if: ${{ steps.check.outputs.report != '{}' && fromJson(steps.check.outputs.report).untested != '[]' }}
        run: node scripts/coverage-enforcer.mjs
        env:
          # Allow generated API tests to import auth/session modules
          SECRET_COOKIE_PASSWORD: ${{ secrets.SECRET_COOKIE_PASSWORD || 'ci-stub-password-32-chars-minimum!!' }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD || 'stub' }}

      - name: Upload coverage enforcer report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-enforcer-report
          path: coverage-report.json
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "### Coverage Enforcer ${{ job.status == 'success' && '✅' || '❌' }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage-report.json ]; then
            UNTESTED=$(cat coverage-report.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('untested',[])))" 2>/dev/null || echo "?")
            echo "- Untested files detected: $UNTESTED" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Branch: \`${{ github.head_ref || github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
